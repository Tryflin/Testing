<!DOCTYPE html>

<html lang="eng">
    <head>
        <meta name="author" content="Hayden Arceneaux" />
        <meta name="description" content="Contact Page" />
        <meta charset="UTF-8" />

        <title>Contact Us</title>

        <link rel="stylesheet" href="contactStyle.css" />
    </head>

    

    <body>
        <nav>
            <span class="logo">Task Management System</span>

            <ul>
                <li><a href="calendar.html">Calendar</a></li>
                <li><a href="index.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            
            <!--Reused signup button for login-->
            <a href="login.html" class="signup-button">Log In</a>
        </nav>

        <main>
            <section class="contact-section">

                <div class="contact-info">
                    <h2>Contact Info</h2>

                    <div class="cell">
                        <img src="contact.jpg">
                    </div>

                    <div class="cell">
                        <h3>Other Forms of Contact</h3>

                        <p>
                            <ul>
                                <li>
                                    <!--We definitely don't have a company phone number-->
                                    Call us at (555)-555-5555
                                </li>
                                <li>
                                    <!--We don't have a company email or anything-->
                                    Email us directly at placeholder@placeholder.com
                                </li>
                            </ul>
                        </p>
                    </div>
                </div>

                <div class="contact-form">
                    <h2>Contact Us</h2>

                    <div class="cell">
                        <form name="contactPage" action="mailto:#" method="post">
                            <label for="clientName">Full Name</label>
                            <input id="clientName" type="text" maxlength="100" required>

                            <label for="clientEmail">Email Address</label>
                            <input id="clientEmail" type="email" maxlength="100" required>

                            <label for="clientReason">Reason For Contact</label>
                            <select id="clientReason">
                                <option value="account">Account</option>

                                <!--This is assuming we even had ads or they werent using an ad blocker-->
                                <!--Was kinda struggling with ideas for why they would even contact us-->
                                <option value="ad">Inappropriate Ad</option>

                                <option value="feedback">General Feedback</option>
                                <option value="other">Other (custom subject)</option>
                            </select>

                            <label for="otherReason" style="display: none;">Other</label>
                            <input id="otherReason" type="text" maxlength="30" placeholder="Please Specify" style="display: none;">

                            <label for="clientMessage">Comments</label>
                            <textarea id="clientMessage" placeholder="Please enter your questions/comments/concerns." rows="10" maxlength="500" required></textarea>

                            <button type="reset">Clear</button>
                            <button type="submit">Submit</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
       
    </body>

    <!--Script at the bottom because it was loading before the page finished before-->
    <script src="contactScript.js"></script>
</html>

    </body>
</html>
